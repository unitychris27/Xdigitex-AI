kind = "web"
previewPath = "/"
title = "XDIGITEX AI"
version = "1.0.0"
id = "artifacts/xdigitex"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19005

[services.development]
run = "pnpm --filter @workspace/xdigitex run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/xdigitex", "run", "build" ]
publicDir = "artifacts/xdigitex/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19005"
BASE_PATH = "/"
