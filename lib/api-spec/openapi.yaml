            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AgentRoute"
    put:
      operationId: adminUpdateRouting
      tags: [admin]
      summary: Admin - update model routing rules
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AgentRoutingUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AgentRoute"

  /admin/costs:
    get:
      operationId: adminGetCosts
      tags: [admin]
      summary: Admin - get cost monitoring
      responses:
        "200":
