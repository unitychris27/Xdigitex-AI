                  $ref: "#/components/schemas/AuditLog"

  /admin/system-health:
    get:
      operationId: adminGetSystemHealth
      tags: [admin]
      summary: Admin - get system health
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SystemHealth"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    MessageResponse:
      type: object
      properties:
        message:
          type: string
      required:
        - message

    # AUTH SCHEMAS
    RegisterInput:
      type: object
      required: [name, email, password]
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8

    LoginInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    AuthResponse:
      type: object
      required: [user, token]
      properties:
        user:
          $ref: "#/components/schemas/User"
        token:
          type: string

    User:
      type: object
      required: [id, name, email, role, status, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [super_admin, admin, moderator, support, user]
        status:
          type: string
          enum: [active, suspended, banned]
        avatarUrl:
          type: ["string", "null"]
        plan:
          type: string
        createdAt:
          type: string
          format: date-time

    # DASHBOARD
    DashboardStats:
      type: object
      required: [projects, activeAgents, botsDeployed, monthlyUsage, revenue, activeUsers]
      properties:
        projects:
          type: integer
        activeAgents:
          type: integer
        botsDeployed:
          type: integer
        monthlyUsage:
          type: number
        revenue:
          type: number
        activeUsers:
          type: integer
        projectsChange:
          type: number
        agentsChange:
          type: number
        botsChange:
          type: number
        revenueChange:
          type: number

    ActivityItem:
      type: object
      required: [id, type, description, createdAt]
      properties:
        id:
          type: integer
        type:
          type: string
          enum: [project_created, bot_deployed, agent_completed, server_connected, deployment_success, secret_created]
        description:
          type: string
        user:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time

    AgentOverview:
      type: object
      required: [id, name, type, status, progress, currentTask]
      properties:
        id:
          type: integer
        name:
          type: string
        type:
          type: string
        status:
          type: string
          enum: [idle, running, completed, failed, paused]
        progress:
          type: integer
        currentTask:
          type: string
        model:
          type: ["string", "null"]
        runtime:
          type: integer

    # PROJECTS
    Project:
      type: object
      required: [id, name, description, status, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        status:
          type: string
          enum: [active, paused, completed, archived]
        repositoryUrl:
          type: ["string", "null"]
        deploymentStatus:
          type: string
          enum: [deployed, deploying, failed, not_deployed]
        lastActivity:
          type: string
          format: date-time
        agentCount:
          type: integer
        deploymentCount:
          type: integer
        createdAt:
          type: string
          format: date-time

    ProjectInput:
      type: object
      required: [name, description]
      properties:
        name:
          type: string
        description:
          type: string
        repositoryUrl:
          type: string

    ProjectUpdate:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        status:
          type: string
        repositoryUrl:
          type: string

    LogEntry:
      type: object
      required: [id, message, level, timestamp]
      properties:
        id:
          type: integer
        message:
          type: string
        level:
          type: string
          enum: [info, warn, error, debug]
        timestamp:
          type: string
          format: date-time

    # AGENTS
    Agent:
      type: object
      required: [id, name, type, status, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        type:
          type: string
          enum: [planner, architect, frontend, backend, devops, qa, security, reviewer, research, telegram_bot_builder]
        status:
          type: string
          enum: [idle, running, completed, failed, paused]
        projectId:
          type: ["integer", "null"]
        model:
          type: ["string", "null"]
        provider:
          type: ["string", "null"]
        task:
          type: ["string", "null"]
        progress:
          type: integer
        runtime:
          type: integer
        createdAt:
          type: string
          format: date-time

    AgentInput:
      type: object
      required: [name, type]
      properties:
        name:
          type: string
        type:
          type: string
        projectId:
          type: integer
        task:
          type: string
        model:
          type: string

    TimelineEvent:
      type: object
      required: [id, agentId, action, description, timestamp]
      properties:
        id:
          type: integer
        agentId:
          type: integer
        action:
          type: string
        description:
          type: string
        status:
          type: string
          enum: [success, failed, in_progress]
        timestamp:
          type: string
          format: date-time

    AgentRoute:
      type: object
      required: [agentType, provider, model]
      properties:
        agentType:
          type: string
        provider:
          type: string
        model:
          type: string

    AgentRoutingUpdate:
      type: object
      required: [routes]
      properties:
        routes:
          type: array
          items:
            $ref: "#/components/schemas/AgentRoute"

    # BOTS
    TelegramBot:
      type: object
      required: [id, name, status, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: ["string", "null"]
        status:
          type: string
          enum: [active, inactive, deploying, error]
        users:
          type: integer
        messages:
          type: integer
        deployments:
          type: integer
        createdAt:
          type: string
          format: date-time

    BotInput:
      type: object
      required: [name, token]
      properties:
        name:
          type: string
        description:
          type: string
        token:
          type: string
        purpose:
          type: string

    BotUpdate:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        status:
          type: string

    BotAnalytics:
      type: object
      required: [totalUsers, totalMessages, activeUsers, dailyMessages]
      properties:
        totalUsers:
          type: integer
        totalMessages:
          type: integer
        activeUsers:
          type: integer
        dailyMessages:
          type: array
          items:
            $ref: "#/components/schemas/DataPoint"

    DataPoint:
      type: object
      required: [date, value]
      properties:
        date:
          type: string
        value:
          type: number

    # DEPLOYMENTS
    Deployment:
      type: object
      required: [id, environment, status, provider, version, createdAt]
      properties:
        id:
          type: integer
        projectId:
          type: ["integer", "null"]
        environment:
          type: string
          enum: [production, staging, development]
        status:
          type: string
          enum: [success, failed, deploying, pending]
        provider:
          type: string
        version:
          type: string
        url:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time

    DeploymentInput:
      type: object
      required: [projectId, environment, provider]
      properties:
        projectId:
          type: integer
        environment:
          type: string
        provider:
          type: string
        version:
          type: string

    # SERVERS
    Server:
      type: object
      required: [id, name, provider, status, location, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        provider:
          type: string
        status:
          type: string
          enum: [online, offline, error, connecting]
        location:
          type: string
        host:
          type: string
        port:
          type: integer
        username:
          type: string
        createdAt:
          type: string
          format: date-time

    ServerInput:
      type: object
      required: [name, host, username, privateKey]
      properties:
        name:
          type: string
        host:
          type: string
        port:
          type: integer
        username:
          type: string
        privateKey:
          type: string
        provider:
          type: string
        location:
          type: string

    ServerUpdate:
      type: object
      properties:
        name:
          type: string
        location:
          type: string
        status:
          type: string

    ServerMetrics:
      type: object
      required: [cpu, ram, storage, network]
      properties:
        cpu:
          type: number
        ram:
          type: number
        storage:
          type: number
        network:
          type: number
        uptime:
          type: integer

    # SECRETS
    Secret:
      type: object
      required: [id, name, type, environment, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: ["string", "null"]
        type:
          type: string
          enum: [api_key, ssh_key, database_credential, token, certificate]
        environment:
          type: string
          enum: [production, staging, development, all]
        lastUsed:
          type: ["string", "null"]
          format: date-time
        createdAt:
          type: string
          format: date-time

    SecretInput:
      type: object
      required: [name, type, value, environment]
      properties:
        name:
          type: string
        description:
          type: string
        type:
          type: string
        value:
          type: string
        environment:
          type: string

    SecretRotateInput:
      type: object
      required: [newValue]
      properties:
        newValue:
          type: string

    # BILLING
    BillingOverview:
      type: object
      required: [plan, monthlyCost, tokenUsage, apiRequests, storageUsage]
      properties:
        plan:
          type: string
        monthlyCost:
          type: number
        tokenUsage:
          type: integer
        tokenLimit:
          type: integer
        apiRequests:
          type: integer
        storageUsage:
          type: number
        storageLimit:
          type: number
        renewalDate:
          type: string
          format: date-time

    Invoice:
      type: object
      required: [id, amount, status, date]
      properties:
        id:
          type: string
        amount:
          type: number
        currency:
          type: string
        status:
          type: string
          enum: [paid, pending, failed, refunded]
        date:
          type: string
          format: date-time
        downloadUrl:
          type: ["string", "null"]

    Plan:
      type: object
      required: [id, name, price, features]
      properties:
        id:
          type: string
        name:
          type: string
        price:
          type: number
        period:
          type: string
        features:
          type: array
          items:
            type: string
        current:
          type: boolean
        tokenLimit:
          type: integer
        agentLimit:
          type: integer

    UsageData:
      type: object
      required: [daily, modelCosts]
      properties:
        daily:
          type: array
          items:
            $ref: "#/components/schemas/DataPoint"
        modelCosts:
          type: array
          items:
            $ref: "#/components/schemas/ModelCost"

    ModelCost:
      type: object
      required: [model, cost, tokens]
      properties:
        model:
          type: string
        cost:
          type: number
        tokens:
          type: integer

    # REFERRALS
    ReferralDashboard:
      type: object
      required: [referralLink, totalReferrals, activeReferrals, earnings, conversionRate]
      properties:
        referralLink:
          type: string
        totalReferrals:
          type: integer
        activeReferrals:
          type: integer
        earnings:
          type: number
        conversionRate:
          type: number
        monthlyEarnings:
          type: array
          items:
            $ref: "#/components/schemas/DataPoint"

    Referral:
      type: object
      required: [id, email, status, joinedAt]
      properties:
        id:
          type: integer
        email:
          type: string
        name:
          type: string
        status:
          type: string
          enum: [active, inactive, pending]
        commission:
          type: number
        joinedAt:
          type: string
          format: date-time

    # PROMOTIONS
    Promotion:
      type: object
      required: [id, name, type, status, startDate, endDate]
      properties:
        id:
          type: integer
        name:
          type: string
        type:
          type: string
          enum: [coupon, discount, free_credits, partner]
        status:
          type: string
          enum: [active, inactive, expired, scheduled]
        discount:
          type: ["number", "null"]
        startDate:
          type: string
          format: date-time
        endDate:
          type: string
          format: date-time
        usageCount:
          type: integer

    PromotionInput:
      type: object
      required: [name, type, startDate, endDate]
      properties:
        name:
          type: string
        type:
          type: string
        discount:
          type: number
        startDate:
          type: string
          format: date-time
        endDate:
          type: string
          format: date-time

    # MARKETPLACE
    Template:
      type: object
      required: [id, name, author, category, downloads, rating, price]
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        author:
          type: string
        category:
          type: string
          enum: [telegram_bots, saas_apps, ai_agents, automation_workflows]
        downloads:
          type: integer
        rating:
          type: number
        price:
          type: number
        imageUrl:
          type: ["string", "null"]
        status:
          type: string
          enum: [draft, review, approved, rejected]

    # ANALYTICS
    AnalyticsData:
      type: object
      required: [users, revenue, deployments, agentUsage, botActivity]
      properties:
        users:
          type: array
          items:
            $ref: "#/components/schemas/DataPoint"
        revenue:
          type: array
          items:
            $ref: "#/components/schemas/DataPoint"
        deployments:
          type: array
          items:
            $ref: "#/components/schemas/DataPoint"
        agentUsage:
          type: array
          items:
            $ref: "#/components/schemas/DataPoint"
        botActivity:
          type: array
          items:
            $ref: "#/components/schemas/DataPoint"
        totalUsers:
          type: integer
        totalRevenue:
          type: number
        totalDeployments:
          type: integer

    # NOTIFICATIONS
    Notification:
      type: object
      required: [id, type, title, message, read, createdAt]
      properties:
        id:
          type: integer
        type:
          type: string
          enum: [deployment, billing, security, agent, referral]
        title:
          type: string
        message:
          type: string
        read:
          type: boolean
        createdAt:
          type: string
          format: date-time

    # TEAM
    TeamMember:
      type: object
      required: [id, name, email, role, status, joinedAt]
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [owner, admin, developer, billing_manager, viewer]
        status:
          type: string
          enum: [active, pending, suspended]
        avatarUrl:
          type: ["string", "null"]
        joinedAt:
          type: string
          format: date-time

    TeamInviteInput:
      type: object
      required: [email, role]
      properties:
        email:
          type: string
          format: email
        role:
          type: string

    TeamMemberUpdate:
      type: object
      required: [role]
      properties:
        role:
          type: string

    # API KEYS
    ApiKey:
      type: object
      required: [id, name, prefix, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        prefix:
          type: string
        lastUsed:
          type: ["string", "null"]
          format: date-time
        createdAt:
          type: string
          format: date-time

    ApiKeyInput:
      type: object
      required: [name]
      properties:
        name:
          type: string

    ApiKeyCreated:
      type: object
      required: [id, name, prefix, key, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        prefix:
          type: string
        key:
          type: string
        createdAt:
          type: string
          format: date-time

    # ADMIN
    AdminUser:
      type: object
      required: [id, name, email, role, status, plan, spend, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        role:
          type: string
        status:
          type: string
        plan:
          type: string
        spend:
          type: number
        createdAt:
          type: string
          format: date-time

    UserStatusUpdate:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [active, suspended, banned]

    AdminAgent:
      type: object
      required: [id, type, user, project, task, status, runtime]
      properties:
        id:
          type: integer
        type:
          type: string
        user:
          type: string
        project:
          type: string
        task:
          type: string
        status:
          type: string
        runtime:
          type: integer

    AiProvider:
      type: object
      required: [id, name, type, status, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        type:
          type: string
        status:
          type: string
          enum: [active, inactive]
        keyCount:
          type: integer
        modelCount:
          type: integer
        createdAt:
          type: string
          format: date-time

    AiProviderInput:
      type: object
      required: [name, type]
      properties:
        name:
          type: string
        type:
          type: string

    AiProviderUpdate:
      type: object
      properties:
        name:
          type: string
        status:
          type: string

    CostOverview:
      type: object
      required: [dailySpend, monthlySpend, revenue, profit]
      properties:
        dailySpend:
          type: number
        monthlySpend:
          type: number
        revenue:
          type: number
        profit:
          type: number
        providerCosts:
          type: array
          items:
            $ref: "#/components/schemas/ProviderCost"

    ProviderCost:
      type: object
      required: [provider, cost]
      properties:
        provider:
          type: string
        cost:
          type: number

    AuditLog:
      type: object
      required: [id, user, action, resource, timestamp]
      properties:
        id:
          type: integer
        user:
          type: string
        action:
          type: string
        resource:
          type: string
        details:
          type: ["string", "null"]
        timestamp:
          type: string
          format: date-time

    SystemHealth:
      type: object
      required: [api, database, queue, workers, storage]
      properties:
        api:
          $ref: "#/components/schemas/ServiceHealth"
        database:
          $ref: "#/components/schemas/ServiceHealth"
        queue:
          $ref: "#/components/schemas/ServiceHealth"
        workers:
          $ref: "#/components/schemas/ServiceHealth"
        storage:
          $ref: "#/components/schemas/ServiceHealth"

    ServiceHealth:
      type: object
      required: [status, latency]
      properties:
        status:
          type: string
          enum: [healthy, warning, critical]
        latency:
          type: ["integer", "null"]
        message:
          type: ["string", "null"]
