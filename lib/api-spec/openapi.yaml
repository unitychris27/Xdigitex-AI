            application/json:
              schema:
                $ref: "#/components/schemas/AiProvider"
    delete:
      operationId: adminDeleteProvider
      tags: [admin]
      summary: Admin - delete AI provider
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /admin/routing:
    get:
      operationId: adminGetRouting
      tags: [admin]
